name: Postman API Tests

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  postman-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "echo 'db.runCommand(\"ping\").ok' | mongosh localhost:27017/test --quiet"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      PORT: 5000
      MONGO_URI: mongodb://127.0.0.1:27017/smart-gate-ci
      JWT_SECRET: smart-gate-ci-secret
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Start backend server
        run: |
          nohup npm start > server.log 2>&1 &

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:5000/ > /dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done
          echo "Backend did not become healthy in time"
          exit 1

      - name: Run Postman tests (Newman)
        run: npm run test:postman:cli

      - name: Upload backend logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-server-log
          path: server.log
